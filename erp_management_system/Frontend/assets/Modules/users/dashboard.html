<!DOCTYPE html>
<html>
<head>
    <title>ERP Dashboard</title>

    <link rel="stylesheet" href="../../css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
       body{
    background:#f8fafc;
}
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>
    <i class="fas fa-layer-group"></i>
    ERP System
</h2>
        <ul>
           <li>
    <a href="dashboard.html" class="active">
        <i class="fas fa-chart-line"></i>
        Dashboard
    </a>
</li>

<li>
    <a href="user.html">
        <i class="fas fa-users"></i>
        Users
    </a>
</li>

<li>
    <a href="../products/product.html">
        <i class="fas fa-box"></i>
        Products
    </a>
</li>

<li>
    <a href="../suppliers/supplier.html">
        <i class="fas fa-truck"></i>
        Suppliers
    </a>
</li>

<li>
    <a href="../inventory/inventory.html">
        <i class="fas fa-warehouse"></i>
        Inventory
    </a>
</li>
        </ul>
        <div class="profile-section">
    <div class="profile-info">

        <i class="fas fa-user-circle profile-icon"></i>

        <h4 id="profileName">User</h4>
        <p id="profileRole">Role</p>

    </div>

    <button class="logout-btn"
            onclick="logout()">
        Logout
    </button>
</div>
    </div>
    <div class="main-content">
        <h1>ERP Dashboard</h1>
        <div class="welcome-box">
    <h3 id="welcomeUser"></h3>
    <p id="currentDate"></p>
</div>
        <div class="cards">
  
    <div class="card">
    <i class="fas fa-users dashboard-icon"></i>
    <h3>Total Users</h3>
    <h1 id="userCount">0</h1>
</div>

<div class="card">
    <i class="fas fa-box dashboard-icon"></i>
    <h3>Total Products</h3>
    <h1 id="productCount">0</h1>
</div>

<div class="card">
    <i class="fas fa-truck dashboard-icon"></i>
    <h3>Total Suppliers</h3>
    <h1 id="supplierCount">0</h1>
</div>

<div class="card">
    <i class="fas fa-warehouse dashboard-icon"></i>
    <h3>Total Inventory</h3>
    <h1 id="inventoryCount">0</h1>
</div>
</div>
    </div>
</div>
<script src="../../js/dashboard.js"></script>
<script src="../../js/profile.js"></script>
</body>
</html>
